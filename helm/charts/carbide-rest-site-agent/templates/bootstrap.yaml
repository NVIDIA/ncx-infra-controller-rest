{{- if .Values.bootstrap.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
  namespace: {{ include "carbide-rest-site-agent.namespace" . }}
  labels:
    {{- include "carbide-rest-site-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
  namespace: {{ include "carbide-rest-site-agent.namespace" . }}
  labels:
    {{- include "carbide-rest-site-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
  - apiGroups: ["forge.nvidia.io"]
    resources: ["sites"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
  namespace: {{ include "carbide-rest-site-agent.namespace" . }}
  labels:
    {{- include "carbide-rest-site-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
    namespace: {{ include "carbide-rest-site-agent.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
  namespace: {{ include "carbide-rest-site-agent.namespace" . }}
  labels:
    {{- include "carbide-rest-site-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "carbide-rest-site-agent.name" . }}-bootstrap
      containers:
        - name: bootstrap
          image: {{ .Values.bootstrap.image }}
          env:
            - name: SITE_UUID
              value: {{ .Values.envConfig.CLUSTER_ID | quote }}
            - name: NAMESPACE
              value: {{ include "carbide-rest-site-agent.namespace" . }}
            - name: SITE_MANAGER_URL
              value: "https://{{ .Values.envConfig.CARBIDE_ADDRESS }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "=== carbide-rest-site-agent bootstrap ==="

              if [ -z "$SITE_UUID" ]; then
                echo "ERROR: SITE_UUID (envConfig.CLUSTER_ID) is not set"
                exit 1
              fi

              # Idempotency: skip if already bootstrapped
              if kubectl get secret {{ .Values.secrets.siteRegistration }} -n "$NAMESPACE" > /dev/null 2>&1; then
                echo "{{ .Values.secrets.siteRegistration }} secret already exists — skipping bootstrap"
                exit 0
              fi

              echo "Creating site via site-manager (uuid=$SITE_UUID)..."
              curl -sfk -X POST "$SITE_MANAGER_URL/v1/site" \
                -H "Content-Type: application/json" \
                -d "{\"siteuuid\":\"$SITE_UUID\"}" || true

              echo "Waiting for Site CR OTP..."
              SITE_NAME="site-$SITE_UUID"
              OTP=""
              for i in $(seq 1 60); do
                OTP=$(kubectl get site "$SITE_NAME" -n "$NAMESPACE" \
                  -o jsonpath='{.status.otp.passcode}' 2>/dev/null || true)
                if [ -n "$OTP" ]; then
                  echo "OTP acquired"
                  break
                fi
                echo "Waiting for OTP ($i/60)..."
                sleep 5
              done

              if [ -z "$OTP" ]; then
                echo "ERROR: Timed out waiting for OTP from Site CR"
                exit 1
              fi

              CACERT=$(kubectl get secret {{ .Values.bootstrap.siteManagerTLSSecret }} \
                -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}' 2>/dev/null | base64 -d || true)

              echo "Creating {{ .Values.secrets.siteRegistration }} secret..."
              kubectl delete secret {{ .Values.secrets.siteRegistration }} -n "$NAMESPACE" --ignore-not-found
              kubectl create secret generic {{ .Values.secrets.siteRegistration }} \
                -n "$NAMESPACE" \
                --from-literal=site-uuid="$SITE_UUID" \
                --from-literal=otp="$OTP" \
                --from-literal=creds-url="https://{{ .Values.envConfig.CARBIDE_ADDRESS }}/v1/sitecreds" \
                --from-literal=cacert="$CACERT"

              echo "=== Bootstrap complete ==="
{{- end }}
