nameOverride: ""
namespaceOverride: ""

image:
  name: carbide-rest-cert-manager

replicaCount: 1

config:
  caCommonName: "Carbide Local Dev CA"
  caOrganization: "NVIDIA"
  caCertFile: "/etc/pki/ca/tls.crt"
  caKeyFile: "/etc/pki/ca/tls.key"
  tlsPort: 8000
  insecurePort: 8001
  caBaseDns: "carbide.local"
  debug: true

secrets:
  caSigningSecret: ca-signing-secret

service:
  type: ClusterIP
  httpsPort: 8000
  httpPort: 8001

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
